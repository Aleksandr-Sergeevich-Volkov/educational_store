{% extends "base.html" %}

{% block title %}Ошибка оплаты{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-body text-center p-5">
                    <div class="mb-4">
                        <i class="fas fa-times-circle text-danger" style="font-size: 80px;"></i>
                    </div>
                    
                    <h1 class="display-5 fw-bold mb-3">❌ Ошибка оплаты</h1>
                    
                    <p class="lead text-muted mb-4">
                        Заказ № <strong>{{ order_id }}</strong> не был оплачен.
                    </p>
                    
                    <div class="alert alert-danger bg-light border-0 rounded-3 p-4 mb-4">
                        <i class="fas fa-info-circle me-2"></i>
                        Пожалуйста, попробуйте снова или обратитесь в службу поддержки.
                    </div>
                    
                    <div class="d-flex justify-content-center gap-3 flex-wrap">
                        <a href="{% url 'catalog:catalog' %}" class="btn btn-primary btn-lg px-4">
                            <i class="fas fa-shopping-bag me-2"></i>Вернуться в каталог
                        </a>
                        <a href="{% url 'cart:cart_detail' %}" class="btn btn-outline-secondary btn-lg px-4">
                            <i class="fas fa-shopping-cart me-2"></i>Вернуться в корзину
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
